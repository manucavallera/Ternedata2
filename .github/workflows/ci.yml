name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend-bussines:
    name: Build ms-nestjs-bussines
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-nestjs-bussines
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ms-nestjs-bussines/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  build-backend-security:
    name: Build ms-nestjs-security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-nestjs-security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ms-nestjs-security/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  build-frontend:
    name: Build ganaderia-web-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ganaderia-web-service
    env:
      # Variables de entorno necesarias para el build de Next.js
      # Configuralas como secrets en GitHub → Settings → Secrets
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SECURITY_API_URL: ${{ secrets.NEXT_PUBLIC_SECURITY_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ganaderia-web-service/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
